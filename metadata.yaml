type: pkiengine

tests:
  config:
    auth:
      type: token
      token:
        token: test-token

status:
  class: receiver
  stability:
    development: [metrics]
  distributions: []
  codeowners:
    active: [cvdtang]

feature_gates:
  - id: receiver.pkiengine.emitCertMetricsFromIssuers
    description: Switches issuer certificate emission from `pkiengine.issuer.x509.*` to `pkiengine.cert.x509.*`.
    stage: alpha
    from_version: v0.151.0
    reference_url: https://github.com/cvdtang/pkienginereceiver/releases/tag/v0.151.0

resource_attributes:
  engine.address:
    description: Address of the secret store.
    enabled: true
    type: string

  engine.namespace:
    description: Namespace of the secret store.
    enabled: true
    type: string

attributes:
  cert.type:
    description: Type of certificate relative to issuer endpoint objects.
    type: string
    enum:
      - issuer
      - leaf

  cert.x509.issuer.common_name:
    description: Common Name (CN) in the issuer field of the certificate.
    type: string

  cert.x509.serial_number:
    description: Serial number in the certificate.
    type: string

  cert.x509.subject.common_name:
    description: Common Name (CN) in the subject field of the certificate.
    type: string

  cert.x509.subject.country:
    description: Country in the subject field of the certificate.
    type: slice

  cert.x509.subject.organization:
    description: Organization in the subject field of the certificate.
    type: slice

  cert.x509.subject.organizational_unit:
    description: Organizational Unit (OU) in the subject field of the certificate.
    type: slice

  crl.kind:
    description: Type of certificate revocation list.
    type: string
    enum:
      - base
      - delta

  crl.role:
    description: Role of the CRL in the certificate chain from the secret store issuer perspective.
    type: string
    enum:
      - subject
      - issuer

  crl.uri:
    description: CRL Distribution Point (CDP) URI.
    type: string

  crl.x509.issuer.common_name:
    description: Common Name (CN) in the CRL issuer field.
    type: string

  engine.mount:
    description: Mount path of the secret store PKI engine.
    type: string

  issuer.id:
    description: Identifier of the issuer generated by the secret store, only for `cert.type=issuer`.
    type: string

metrics:
  pkiengine.cert.x509.not_after:
    description: Time until certificate expiration as specified by the `notAfter` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - cert.type
     - cert.x509.issuer.common_name
     - cert.x509.serial_number
     - cert.x509.subject.common_name
     - cert.x509.subject.country
     - cert.x509.subject.organization
     - cert.x509.subject.organizational_unit
     - engine.mount
     - issuer.id

  pkiengine.cert.x509.not_before:
    description: Time util certificate validity start as specified by the `notBefore` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - cert.type
     - cert.x509.issuer.common_name
     - cert.x509.serial_number
     - cert.x509.subject.common_name
     - cert.x509.subject.country
     - cert.x509.subject.organization
     - cert.x509.subject.organizational_unit
     - engine.mount
     - issuer.id

  pkiengine.crl.cache.evictions:
    description: Number of CRL cache evictions.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: "{evictions}"
    attributes: []

  pkiengine.crl.cache.hits:
    description: Number of CRL cache hits.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: "{hits}"
    attributes: []

  pkiengine.crl.cache.misses:
    description: Number of CRL cache misses.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: "{misses}"
    attributes: []

  pkiengine.crl.processing_status:
    enabled: true
    stability: development
    description: CRL processing status as an integer value.
    extended_documentation: >
      Gauge values map to CRL processing status as follows:
      0 - Failed to fetch,
      1 - Failed to parse,
      2 - Successfully processed
    unit: '{status}'
    gauge:
      value_type: int
    attributes:
     - crl.role
     - crl.kind
     - crl.uri

  pkiengine.crl.x509.next_update:
    description: Time until the CRL `nextUpdate` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - crl.uri
     - crl.role
     - crl.kind
     - crl.x509.issuer.common_name

  pkiengine.crl.x509.revoked_certificates:
    description: Number of certificates listed in the CRL `revokedCertificates` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: count
    attributes:
     - crl.uri
     - crl.role
     - crl.kind
     - crl.x509.issuer.common_name

  pkiengine.crl.x509.this_update:
    description: Time since the CRL `thisUpdate` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - crl.uri
     - crl.role
     - crl.kind
     - crl.x509.issuer.common_name

  pkiengine.issuer.errors:
    description: Number of errors that occurred while processing issuers.
    enabled: true
    stability: development
    sum:
      value_type: int
    unit: "{errors}"
    attributes: []
    warnings:
      if_enabled: This metric namespace is deprecated; use `pkiengine.cert.x509.*` metrics where applicable.

  pkiengine.issuer.x509.not_after:
    description: Time until certificate expiration as specified by the `notAfter` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - issuer.id
     - cert.x509.subject.common_name
     - cert.x509.issuer.common_name
     - engine.mount
    warnings:
      if_enabled: This metric is deprecated; use `pkiengine.cert.x509.not_after` instead.

  pkiengine.issuer.x509.not_before:
    description: Time util certificate validity start as specified by the `notBefore` field.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: minutes
    attributes:
     - issuer.id
     - cert.x509.subject.common_name
     - cert.x509.issuer.common_name
     - engine.mount
    warnings:
      if_enabled: This metric is deprecated; use `pkiengine.cert.x509.not_before` instead.

  pkiengine.mount.certificates_stored:
    description: Number of certificates stored in the mount.
    enabled: true
    stability: development
    gauge:
      value_type: int
    unit: "{certificates_stored}"
    attributes:
     - engine.mount

  pkiengine.mount.errors:
    description: Number of errors that occurred while processing mounts.
    enabled: true
    stability: development
    sum:
      value_type: int
    unit: "{errors}"
    attributes: []
